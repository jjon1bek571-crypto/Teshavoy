<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #060612;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 40%, rgba(124,58,237,0.25) 0%, transparent 55%);
  }

  .center { position: relative; z-index: 2; text-align: center; }

  .percent {
    font-size: 200px; font-weight: 900;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1; letter-spacing: -8px;
    margin-bottom: 0;
  }

  .label {
    font-size: 28px; font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .sublabel {
    font-size: 20px; color: rgba(255,255,255,0.35);
    font-weight: 400; margin-bottom: 60px;
  }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.6), transparent);
    margin: 0 auto 50px;
  }

  .cta {
    font-size: 18px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(124,58,237,0.12);
  }
  .r1 { width:700px;height:700px; top:50%;left:50%;transform:translate(-50%,-50%); }
  .r2 { width:900px;height:900px; top:50%;left:50%;transform:translate(-50%,-50%); border-color:rgba(124,58,237,0.06); }

  .corner {
    position: absolute;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
  }
  .tl { top: 40px; left: 50px; }
  .tr { top: 40px; right: 50px; }
  .bl { bottom: 40px; left: 50px; }
  .br { bottom: 40px; right: 50px; color: rgba(124,58,237,0.5); }
</style>
</head>
<body>
  <div class="ring r1"></div>
  <div class="ring r2"></div>

  <div class="corner tl">MIYA.EXE</div>
  <div class="corner tr">TEASER №3</div>
  <div class="corner bl">@myprojectuz1</div>
  <div class="corner br">SOON ◈</div>

  <div class="center">
    <div class="percent">97%</div>
    <div class="label">odam bu testdan yiqilgan.</div>
    <div class="sublabel">Siz ham sinab ko'rasizmi?</div>
    <div class="divider"></div>
    <div class="cta">Tez kunda • @myprojectuz1</div>
  </div>
</body>
</html>
