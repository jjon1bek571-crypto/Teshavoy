<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1080px;overflow:hidden;}
  body{
    background:#07070f;
    font-family:'Inter',sans-serif;
    position:relative;
  }

  /* BG gradients */
  .bg{position:absolute;inset:0;}
  .bg::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 800px 800px at 50% -100px, rgba(109,40,217,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 100% 100%, rgba(236,72,153,0.2) 0%, transparent 60%);
  }
  /* Noise texture */
  .bg::after{
    content:'';position:absolute;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:0.4;
  }

  /* Grid */
  .grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:54px 54px;
  }

  /* Content */
  .wrap{
    position:relative;z-index:10;
    width:100%;height:100%;
    display:flex;flex-direction:column;
    padding:60px;
  }

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:auto;
  }
  .logo-text{
    font-size:13px;font-weight:700;letter-spacing:4px;
    color:rgba(255,255,255,0.25);text-transform:uppercase;
  }
  .badge{
    background:rgba(109,40,217,0.2);
    border:1px solid rgba(109,40,217,0.5);
    color:#a78bfa;font-size:11px;font-weight:700;
    letter-spacing:3px;padding:6px 16px;border-radius:100px;
    text-transform:uppercase;
  }

  /* Main content */
  .main{margin-bottom:auto;padding:40px 0;}

  .eyebrow{
    font-size:13px;font-weight:600;letter-spacing:5px;
    color:rgba(167,139,250,0.7);text-transform:uppercase;
    margin-bottom:28px;
    display:flex;align-items:center;gap:12px;
  }
  .eyebrow::before{
    content:'';display:block;
    width:32px;height:1px;background:rgba(167,139,250,0.4);
  }

  .headline{
    font-size:96px;font-weight:900;
    line-height:0.92;letter-spacing:-4px;
    margin-bottom:36px;
  }
  .h-white{color:#fff;}
  .h-grad{
    background:linear-gradient(135deg,#a78bfa 0%,#ec4899 60%,#f97316 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }

  .body-text{
    font-size:22px;font-weight:400;
    color:rgba(255,255,255,0.4);
    line-height:1.65;max-width:560px;
  }
  .body-text strong{color:rgba(255,255,255,0.75);font-weight:600;}

  /* Bottom */
  .bottom{
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .channel{
    font-size:26px;font-weight:800;
    color:#fff;letter-spacing:-0.5px;
    display:flex;align-items:center;gap:12px;
  }
  .channel-dot{
    width:10px;height:10px;border-radius:50%;
    background:#a78bfa;box-shadow:0 0 12px #a78bfa;
  }

  .soon-block{text-align:right;}
  .soon-label{
    font-size:11px;font-weight:700;letter-spacing:4px;
    color:rgba(255,255,255,0.2);text-transform:uppercase;
    margin-bottom:6px;
  }
  .soon-num{
    font-size:72px;font-weight:900;letter-spacing:-3px;
    background:linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1;
  }

  /* Decorative line */
  .line{
    position:absolute;
    left:60px;right:60px;
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  }
  .l1{top:140px;}
  .l2{bottom:140px;}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="line l1"></div>
  <div class="line l2"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="logo-text">MIYA.EXE — Project</div>
      <div class="badge">Teaser 01</div>
    </div>

    <div class="main">
      <div class="eyebrow">Diqqat</div>
      <div class="headline">
        <div class="h-white">Miyangiz</div>
        <div class="h-white">qancha</div>
        <div class="h-grad">ishlaydi?</div>
      </div>
      <div class="body-text">
        Hech kim sizga bu haqiqatni<br>
        aytmagan. <strong>Biz aytamiz.</strong>
      </div>
    </div>

    <div class="bottom">
      <div class="channel">
        <div class="channel-dot"></div>
        @myprojectuz1
      </div>
      <div class="soon-block">
        <div class="soon-label">Tez kunda</div>
        <div class="soon-num">Soon</div>
      </div>
    </div>
  </div>
</body>
</html>
