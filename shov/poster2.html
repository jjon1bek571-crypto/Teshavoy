<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1080px;overflow:hidden;}
  body{background:#040410;font-family:'Inter',sans-serif;position:relative;}

  .bg{position:absolute;inset:0;
    background:
      radial-gradient(ellipse 700px 500px at 0% 100%, rgba(236,72,153,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 500px 700px at 100% 0%, rgba(59,130,246,0.15) 0%, transparent 60%);
  }

  /* Diagonal lines */
  .diag{position:absolute;inset:0;overflow:hidden;}
  .diag::before{
    content:'';position:absolute;
    width:200%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
    top:30%;left:-50%;transform:rotate(-25deg);transform-origin:center;
  }
  .diag::after{
    content:'';position:absolute;
    width:200%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
    top:65%;left:-50%;transform:rotate(-25deg);transform-origin:center;
  }

  .wrap{position:relative;z-index:10;width:100%;height:100%;padding:60px;display:flex;flex-direction:column;}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:80px;}
  .logo{font-size:15px;font-weight:900;letter-spacing:6px;color:rgba(255,255,255,0.15);}
  .num{font-size:13px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,0.15);}

  .center-content{flex:1;display:flex;flex-direction:column;justify-content:center;}

  /* Big emoji */
  .emoji-display{
    font-size:88px;margin-bottom:40px;line-height:1;
    filter:drop-shadow(0 0 40px rgba(236,72,153,0.4));
  }

  .big-text{
    font-size:80px;font-weight:900;
    color:#fff;line-height:0.95;
    letter-spacing:-3px;margin-bottom:20px;
  }
  .big-text .small-line{
    font-size:48px;font-weight:300;
    color:rgba(255,255,255,0.3);letter-spacing:-1px;
    display:block;margin-bottom:8px;
  }
  .big-text .pink{
    background:linear-gradient(90deg,#ec4899,#f97316);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }

  .desc{
    font-size:20px;color:rgba(255,255,255,0.35);
    line-height:1.7;margin-bottom:60px;font-weight:400;
  }
  .desc b{color:rgba(255,255,255,0.65);font-weight:600;}

  /* Feature pills */
  .pills{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.4);
    font-size:13px;font-weight:600;letter-spacing:0.5px;
    padding:10px 18px;border-radius:100px;
  }
  .pill.p{border-color:rgba(167,139,250,0.3);color:rgba(167,139,250,0.7);}
  .pill.r{border-color:rgba(236,72,153,0.3);color:rgba(236,72,153,0.7);}
  .pill.g{border-color:rgba(34,197,94,0.3);color:rgba(34,197,94,0.7);}

  .bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
  .channel{font-size:22px;font-weight:800;color:rgba(255,255,255,0.6);}
  .insta{font-size:15px;font-weight:500;color:rgba(255,255,255,0.2);letter-spacing:1px;}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="diag"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="logo">MIYA.EXE</div>
      <div class="num">02 / 04</div>
    </div>

    <div class="center-content">
      <div class="emoji-display">😂</div>
      <div class="big-text">
        <span class="small-line">Bu oddiy</span>
        <span class="pink">bot emas.</span>
      </div>
      <div class="desc">
        U siz haqingizda<br>
        <b>o'zingizdan ko'proq biladi.</b>
      </div>
      <div class="pills">
        <div class="pill p">🧠 AI Tahlil</div>
        <div class="pill r">😂 Kulgili</div>
        <div class="pill g">⚡ Mini O'yinlar</div>
        <div class="pill">🎯 IQ Test</div>
        <div class="pill">🤔 Psixologiya</div>
      </div>
    </div>

    <div class="bottom">
      <div class="channel">@myprojectuz1</div>
      <div class="insta">@djuraeef_v</div>
    </div>
  </div>
</body>
</html>
